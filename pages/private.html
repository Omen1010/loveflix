<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Private Vault 🔒</title>

<link
rel="stylesheet"
href="../css/style.css">

</head>

<body>

<!-- PASSWORD SCREEN -->

<div
class="password-screen"
id="passwordScreen">

<div class="password-box">

<h1>
Private Vault 🔒
</h1>

<p>
Enter password to continue
</p>

<input
type="password"
id="passwordInput"
placeholder="Enter Password">

<div class="password-buttons">

<button
class="unlock-btn"
onclick="checkPassword()">

Unlock

</button>

<button
class="back-btn"
onclick="goBack()">

Back

</button>

</div>

</div>

</div>

<!-- PRIVATE CONTENT -->

<div
id="privateContent"
style="display:none;">

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
LOVEFLIX
</div>

<div class="nav-right">

<button
class="nav-btn"
onclick="goBack()">

← Back

</button>

</div>

</nav>

<!-- HERO -->

<section class="hero private-hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>
Private Vault 🔥
</h1>

<p>
Only ours.
</p>

</div>

</section>

<!-- PRIVATE IMAGES -->

<section class="section">

<h2>
Private Images ❤️
</h2>

<div class="cards">

<div
class="card"
onclick="openViewer('../uploads/private-images/photo1.png')">

<img
src="../uploads/private-images/photo1.png">

</div>

<div
class="card"
onclick="openViewer('../uploads/private-images/photo2.png')">

<img
src="../uploads/private-images/photo2.png">

</div>

</div>

</section>

<!-- PRIVATE VIDEOS -->

<section class="section">

<h2>
Private Videos 🎥
</h2>

<div class="video-grid">

<video controls>

<source
src="../uploads/private-videos/video1.mp4"
type="video/mp4">

</video>

<video controls>

<source
src="../uploads/private-videos/video2.mp4"
type="video/mp4">

</video>

</div>

</section>

</div>

<!-- VIEWER -->

<div
class="viewer"
id="viewer">

<span
class="close"
onclick="closeViewer()">

×

</span>

<img
id="viewerImage"
src="">

</div>

<script src="../js/app.js"></script>

</body>
</html>
